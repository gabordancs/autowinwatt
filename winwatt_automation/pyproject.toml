[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "winwatt-automation"
version = "0.1.0"
description = "Automate WinWatt desktop workflows via parsed UI model + automation layers"
readme = "README.md"
requires-python = ">=3.12"
authors = [{name = "Autogenerated"}]
dependencies = [
  "pywinauto",
  "lxml",
  "pydantic>=2.0",
  "loguru",
  "tenacity",
  "typer>=0.12",
]

[project.optional-dependencies]
dev = ["pytest", "networkx"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
